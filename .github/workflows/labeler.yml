name: Labeler

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply PR labels
    runs-on: ubuntu-latest

    steps:
      - name: Label pull request
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6
