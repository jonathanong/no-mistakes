name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump type
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      base-sha: ${{ steps.bump.outputs.base-sha }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Check RELEASE_TOKEN is set
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. This workflow requires a PAT that can push release commits and tags to main." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions, commit, and tag
        id: bump
        env:
          SKIP_BINARY_DOWNLOAD: "1"
        shell: bash
        run: |
          set -euo pipefail
          base_sha="$(git rev-parse HEAD)"
          npm version "${{ inputs.bump }}" --no-git-tag-version
          version="$(node -p "require('./package.json').version")"

          for pkg in no-mistakes eslint-plugin-no-mistakes; do
            npm pkg set "version=$version" --workspace "$pkg"
          done
          npm install --package-lock-only --ignore-scripts

          node - "$version" <<'NODE'
          const fs = require("node:fs");
          const version = process.argv[2];
          const crates = [
            "Cargo.toml",
            "crates/no-mistakes/Cargo.toml",
          ];
          for (const file of crates) {
            if (!fs.existsSync(file)) continue;
            const cargo = fs.readFileSync(file, "utf8").replace(
              /^version = ".*"$/m,
              `version = "${version}"`,
            );
            fs.writeFileSync(file, cargo);
          }
          NODE

          cargo update -w
          git add .
          git commit -m "chore(release): v$version" -m "Co-authored-by: Codex <noreply@openai.com>"
          git tag -a "v$version" -m "v$version"
          echo "base-sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create prepared release artifacts
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar HEAD | gzip > "$RUNNER_TEMP/release-source.tgz"
          git format-patch -1 HEAD --stdout > "$RUNNER_TEMP/release.patch"

      - name: Upload prepared source
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-source
          path: ${{ runner.temp }}/release-source.tgz
          if-no-files-found: error

      - name: Upload release patch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-patch
          path: ${{ runner.temp }}/release.patch
          if-no-files-found: error

  validate:
    name: Validate
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Reclaim runner disk space
        uses: insightsengineering/disk-space-reclaimer@dae9fabcb8febe09f6585471948acf9dc9a57489 # v1.1.2
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: false
          swap-storage: false
          tools-cache: false

      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-source
          path: prepared-release

      - name: Extract prepared source
        run: tar -xzf prepared-release/release-source.tgz

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Verify versions
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.version }}"
          cargo metadata --no-deps --format-version 1 > "$RUNNER_TEMP/cargo-metadata.json"
          node - "$tag" "$RUNNER_TEMP/cargo-metadata.json" <<'NODE'
          const fs = require("node:fs");
          const expected = process.argv[2];
          const metadata = JSON.parse(fs.readFileSync(process.argv[3], "utf8"));
          const mismatches = metadata.packages
            .filter((pkg) => pkg.version !== expected)
            .map((pkg) => `${pkg.name}@${pkg.version}`);
          if (mismatches.length > 0) {
            console.error(`Cargo version mismatch: ${mismatches.join(", ")}`);
            process.exit(1);
          }
          NODE
          node - "$tag" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const expected = process.argv[2];
          const files = [
            "package.json",
            ...fs.readdirSync("packages")
              .map((name) => path.join("packages", name, "package.json"))
              .filter((file) => fs.existsSync(file)),
          ];
          const mismatches = files
            .map((file) => [file, JSON.parse(fs.readFileSync(file, "utf8")).version])
            .filter(([, version]) => version !== expected)
            .map(([file, version]) => `${file}@${version}`);
          if (mismatches.length > 0) {
            console.error(`npm version mismatch: ${mismatches.join(", ")}`);
            process.exit(1);
          }
          NODE

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run CSpell
        run: npm run lint:spell

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Run Rust tests
        run: cargo test --all-features

      - name: Run npm tests
        run: npm test

      - name: Check Cargo packages
        run: cargo publish --dry-run --locked -p no-mistakes

      - name: Check npm packages
        run: |
          for pkg in no-mistakes eslint-plugin-no-mistakes; do
            npm pack --dry-run --workspace "$pkg"
          done

  build:
    name: Build for ${{ matrix.target }}
    needs:
      - prepare
      - validate
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-msvc
        include:
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            os: windows-2025
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download prepared source
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-source
          path: prepared-release

      - name: Extract prepared source
        run: tar -xzf prepared-release/release-source.tgz

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: v1-rust-release
          cache-bin: "false"

      - name: Build binary
        shell: bash
        run: |
          cargo build --release --locked --target ${{ matrix.target }} -p no-mistakes
          rm -f target/${{ matrix.target }}/release/libno_mistakes*.so
          rm -f target/${{ matrix.target }}/release/libno_mistakes*.dylib
          rm -f target/${{ matrix.target }}/release/no_mistakes*.dll
          rm -f target/${{ matrix.target }}/release/deps/libno_mistakes*.so
          rm -f target/${{ matrix.target }}/release/deps/libno_mistakes*.dylib
          rm -f target/${{ matrix.target }}/release/deps/no_mistakes*.dll
          NO_MISTAKES_BUILD_NAPI=1 cargo rustc --release --locked --target ${{ matrix.target }} -p no-mistakes --lib --crate-type cdylib

      - name: Stage assets
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            *windows*)
              bin_ext=".exe"
              lib_name="no_mistakes.dll"
              lib_pattern="no_mistakes*.dll"
              ;;
            *apple-darwin*)
              bin_ext=""
              lib_name="libno_mistakes.dylib"
              lib_pattern="libno_mistakes*.dylib"
              ;;
            *)
              bin_ext=""
              lib_name="libno_mistakes.so"
              lib_pattern="libno_mistakes*.so"
              ;;
          esac
          mkdir -p release-assets
          binary_source="target/${{ matrix.target }}/release/no-mistakes$bin_ext"
          binary_artifact="release-assets/no-mistakes-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}$bin_ext"
          addon_source="target/${{ matrix.target }}/release/$lib_name"
          if [[ ! -f "$addon_source" ]]; then
            addon_candidates=()
            while IFS= read -r addon_candidate; do
              addon_candidates+=("$addon_candidate")
            done < <(find "target/${{ matrix.target }}/release/deps" -maxdepth 1 -type f -name "$lib_pattern" -print | sort)
            if [[ "${#addon_candidates[@]}" -ne 1 ]]; then
              echo "Expected exactly one N-API addon artifact matching $lib_pattern, found ${#addon_candidates[@]}" >&2
              printf '%s\n' "${addon_candidates[@]}" >&2
              exit 1
            fi
            addon_source="${addon_candidates[0]}"
          fi
          addon_artifact="release-assets/no-mistakes-napi-v${{ needs.prepare.outputs.version }}-${{ matrix.target }}.node"
          "$binary_source" --version
          cp "$binary_source" "$binary_artifact"
          cp "$addon_source" "$addon_artifact"

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: release-assets
        run: |
          for artifact in *; do
            [[ "$artifact" == *.sha256 ]] && continue
            shasum -a 256 "$artifact" > "$artifact.sha256"
          done

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: release-assets
        run: |
          Get-ChildItem -File | Where-Object { $_.Name -notlike "*.sha256" } | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $_.Name).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -Encoding ascii -NoNewline "$($_.Name).sha256"
          }

      - name: Upload asset artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish
    needs:
      - prepare
      - validate
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Download release patch
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-patch
          path: prepared-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply release commit and tag
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ needs.prepare.outputs.base-sha }}"
          version="${{ needs.prepare.outputs.version }}"
          current_sha="$(git rev-parse HEAD)"
          release_subject="chore(release): v$version"
          if [ "$current_sha" = "$base_sha" ]; then
            git am prepared-release/release.patch
          elif [ "$(git log -1 --format=%s)" = "$release_subject" ] && [ "$(git rev-parse HEAD^)" = "$base_sha" ]; then
            echo "Release commit v$version is already applied to main; continuing."
          else
            echo "::error::main moved from $base_sha to $current_sha while this release was running. Re-run the release workflow from current main." >&2
            exit 1
          fi
          release_sha="$(git rev-parse HEAD)"
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            git fetch origin "refs/tags/v$version:refs/tags/v$version"
          fi
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "v$version")"
            if [ "$tag_sha" != "$release_sha" ]; then
              echo "::error::tag v$version points at $tag_sha, expected $release_sha." >&2
              exit 1
            fi
            echo "Tag v$version already points at the release commit; continuing."
          else
            git tag -a "v$version" -m "v$version"
          fi
          git push origin HEAD:main "v$version"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Install npm dependencies
        run: SKIP_BINARY_DOWNLOAD=1 npm ci --ignore-scripts

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Publish Cargo crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          for pkg in no-mistakes; do
            if curl --fail --silent --output /dev/null "https://crates.io/api/v1/crates/$pkg/$version"; then
              echo "$pkg $version is already published on crates.io; skipping"
            else
              publish_log="$RUNNER_TEMP/cargo-publish-$pkg.log"
              cargo publish --dry-run --locked -p "$pkg"
              if cargo publish --locked -p "$pkg" 2>&1 | tee "$publish_log"; then
                :
              elif grep -q "already exists on crates.io index" "$publish_log"; then
                echo "$pkg $version is already published on crates.io; skipping"
              else
                exit 1
              fi
            fi
          done

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.prepare.outputs.version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* --title "$tag" --generate-notes
          fi

      - name: Publish npm packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            echo "Publishing npm packages with NPM_TOKEN"
          else
            echo "Publishing npm packages with OIDC trusted publishing"
          fi
          version="${{ needs.prepare.outputs.version }}"
          for pkg in no-mistakes eslint-plugin-no-mistakes; do
            if npm view "$pkg@$version" version >/dev/null 2>&1; then
              echo "$pkg $version is already published on npm; skipping"
            else
              npm publish --provenance --access public --workspace "$pkg"
            fi
          done
