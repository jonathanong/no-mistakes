name: Test CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  tests:
    name: Tests with coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Check committed binary files
        shell: bash
        run: |
          set -euo pipefail

          escape_workflow_command_property() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            value="${value//':'/'%3A'}"
            value="${value//','/'%2C'}"
            printf '%s' "$value"
          }

          fail=0
          while IFS= read -r -d '' path; do
            metadata="$(git ls-files -s -- "$path")"
            mode="${metadata%% *}"
            rest="${metadata#* }"
            object="${rest%% *}"

            if [[ "$mode" != 100644 && "$mode" != 100755 ]]; then
              continue
            fi

            if git cat-file blob "$object" | perl -e 'while (1) { my $n = sysread(STDIN, my $buffer, 65536); die "read failed: $!" unless defined $n; last if $n == 0; exit 1 if $buffer =~ /[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/; }'; then
              continue
            else
              escaped_path="$(escape_workflow_command_property "$path")"
              printf '::error file=%s::Committed binary file detected; remove it from Git or replace it with a text placeholder.\n' "$escaped_path"
              fail=1
            fi
          done < <(git ls-files -z)
          exit "$fail"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Validate Codecov config
        run: curl --data-binary @codecov.yml https://codecov.io/validate

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run CSpell
        run: npm run lint:spell

      - name: Run Lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --exclude-path ^fixtures/
            README.md
            docs/**/*.md
            skills/**/*.md
            packages/*/README.md
            crates/*/README.md
            CLAUDE.md
          fail: true

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Run npm tests
        run: npm run test:ci --ignore-scripts

      - name: Check Cargo packages
        run: |
          cargo publish --dry-run --locked -p no-mistakes

      - name: Check npm packages
        run: npm pack --dry-run --workspaces

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Clean Rust coverage artifacts
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace

      - name: Build Rust tests for coverage
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo test --workspace --all-features --lib --bins --tests --no-run

      - name: Run Rust tests for coverage
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo test --workspace --all-features --lib --bins --tests

      - name: Show Rust coverage table (debug)
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov report \
            --show-missing-lines 2>&1 | tail -60
        continue-on-error: true

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov report \
            --fail-under-lines 99 --fail-under-functions 99 --show-missing-lines --lcov --output-path target/llvm-cov/lcov.info

      - name: Install cargo-crap
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # v2.77.6
        with:
          tool: cargo-crap

      - name: Enforce CRAP threshold
        run: cargo crap --lcov target/llvm-cov/lcov.info --fail-above --threshold 30 --missing skip

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

      - name: Upload JavaScript coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v6.0.1
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: javascript
          fail_ci_if_error: true

  ast-analysis:
    name: AST analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ast-analysis

      - name: Build no-mistakes check CLI
        run: cargo build --release -p no-mistakes

      - name: Run no-mistakes check
        run: target/release/no-mistakes check

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Build benchmarks
        run: cargo bench -p no-mistakes --benches --no-run

      - name: Run graph related benchmark
        run: cargo bench -p no-mistakes --bench graph_related -- --noplot

      - name: Run large repo dependencies benchmark
        run: cargo bench -p no-mistakes --bench dependencies_large_repo -- --noplot

      - name: Run check benchmark
        run: cargo bench -p no-mistakes --bench check -- --noplot

      - name: Build release CLI for timing smoke
        run: cargo build --release -p no-mistakes

      - name: Run large graph timing smoke
        run: |
          target/release/no-mistakes dependencies \
            --root test-cases/codebase-analysis/large-graph-monorepo/fixture \
            --relationship all \
            --timings \
            --format json \
            apps/web/src/entrypoints/graph-smoke.tsx \
            apps/api/src/entrypoints/public-api.mts \
            scripts/orchestrate.mts \
            tests/e2e/all-routes.spec.ts \
            .github/workflows/ci.yml \
            README.md > large-graph-dependencies.json
          wc -c large-graph-dependencies.json
