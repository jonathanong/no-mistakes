name: Test CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

jobs:
  tests:
    name: Tests with coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check committed binary files
        shell: bash
        run: |
          set -euo pipefail

          escape_workflow_command_property() {
            local value="$1"
            value="${value//'%'/'%25'}"
            value="${value//$'\r'/'%0D'}"
            value="${value//$'\n'/'%0A'}"
            value="${value//':'/'%3A'}"
            value="${value//','/'%2C'}"
            printf '%s' "$value"
          }

          fail=0
          while IFS= read -r -d '' path; do
            metadata="$(git ls-files -s -- "$path")"
            mode="${metadata%% *}"
            rest="${metadata#* }"
            object="${rest%% *}"

            if [[ "$mode" != 100644 && "$mode" != 100755 ]]; then
              continue
            fi

            if git cat-file blob "$object" | perl -e 'while (1) { my $n = sysread(STDIN, my $buffer, 65536); die "read failed: $!" unless defined $n; last if $n == 0; exit 1 if $buffer =~ /[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/; }'; then
              continue
            else
              escaped_path="$(escape_workflow_command_property "$path")"
              printf '::error file=%s::Committed binary file detected; remove it from Git or replace it with a text placeholder.\n' "$escaped_path"
              fail=1
            fi
          done < <(git ls-files -z)
          exit "$fail"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Validate Codecov config
        run: curl --data-binary @codecov.yml https://codecov.io/validate

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check JavaScript formatting
        run: npm run fmt:js:check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Oxlint
        run: npm run lint:js

      - name: Run CSpell
        run: npm run lint:spell

      - name: Run Lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --exclude-path ^fixtures/
            README.md
            docs/**/*.md
            skills/**/*.md
            packages/*/README.md
            crates/*/README.md
            CLAUDE.md
          fail: true

      - name: Build JavaScript packages
        run: npm run build:js

      - name: Run npm tests
        run: npm run test:ci --ignore-scripts

      - name: Check Cargo packages
        run: |
          cargo publish --dry-run --locked -p no-mistakes

      - name: Check npm packages
        run: npm pack --dry-run --workspaces

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-llvm-cov

      - name: Clean Rust coverage artifacts
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace

      - name: Build Rust tests for coverage
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo test --workspace --all-features --lib --bins --tests --no-run

      - name: Run Rust tests for coverage
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo test --workspace --all-features --lib --bins --tests

      - name: Show Rust coverage table (debug)
        run: |
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov report \
            --show-missing-lines 2>&1 | tail -60
        continue-on-error: true

      - name: Enforce Rust coverage
        run: |
          mkdir -p target/llvm-cov
          # shellcheck disable=SC1090
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov report \
            --fail-under-lines 99 --fail-under-functions 99 --show-missing-lines --lcov --output-path target/llvm-cov/lcov.info

      - name: Install cargo-crap
        uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: cargo-crap

      - name: Enforce CRAP threshold
        run: cargo crap --lcov target/llvm-cov/lcov.info --fail-above --threshold 30 --missing skip

      - name: Upload Rust coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: target/llvm-cov/lcov.info
          flags: rust
          fail_ci_if_error: true

      - name: Upload JavaScript coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: javascript
          fail_ci_if_error: true

  ast-analysis:
    name: AST analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ast-analysis

      - name: Build no-mistakes check CLI
        run: cargo build --release -p no-mistakes

      - name: Run no-mistakes check
        run: target/release/no-mistakes check

      - name: Install ast-grep
        run: |
          curl -sSfL -o ast-grep.zip https://github.com/ast-grep/ast-grep/releases/download/0.44.1/app-x86_64-unknown-linux-gnu.zip
          echo "611f9e5e76f2611ecea1a35dd3468ceedf600641a11224b80341d79c6ee7b9dd  ast-grep.zip" | sha256sum -c -
          unzip -o ast-grep.zip ast-grep
          chmod +x ast-grep
          sudo mv ast-grep /usr/local/bin/ast-grep
          rm ast-grep.zip

      - name: Run ast-grep rule tests
        run: ast-grep test --skip-snapshot-tests

      - name: Run ast-grep scan
        run: ast-grep scan

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RAYON_NUM_THREADS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          toolchain: "1.96.0"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: bench

      - name: Install cargo-codspeed
        run: cargo install cargo-codspeed --version 5.0.1 --locked

      - name: Build CPU and memory benchmarks
        run: >-
          cargo codspeed build
          -p no-mistakes
          --features test-instrumentation
          --bench core_analysis
          -m simulation
          -m memory

      - name: Run CPU benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: simulation
          run: cargo codspeed run -m simulation

      # Keep memory execution separate: CodSpeed instruments the same in-process
      # fixture workloads with allocation tracking instead of CPU simulation.
      - name: Run memory benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: memory
          run: cargo codspeed run -m memory
