rules:
  - rule: rust-max-lines-per-file
    scope: repository
    options:
      srcMax: 200
      testMax: 500
  - rule: rust-no-inline-tests
    scope: repository
    options:
      excludes:
        - test-cases/
  - rule: rust-no-inline-allows
    scope: repository
    options:
      excludes:
        - test-cases/
  - rule: agents-md-max-size
    scope: repository
    options:
      maxLines: 200
      maxChars: 12000
