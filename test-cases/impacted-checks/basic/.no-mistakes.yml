tests:
  vitest:
    projects:
      unit:
        include: ["src/**/*.test.ts"]
checks:
  commands:
    - name: eslint
      include: ["src/**/*.ts"]
      exclude: ["src/**/*.test.ts"]
      command: ["pnpm", "exec", "eslint"]
      fileArgs: append
    - name: tsc
      include: ["**/*.ts"]
      command: ["pnpm", "exec", "tsc", "--noEmit"]
      fileArgs: none
    - name: prettier
      include: ["**/*.md"]
      command: ["pnpm", "exec", "prettier", "--check"]
      fileArgs: append
