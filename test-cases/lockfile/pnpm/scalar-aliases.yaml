importers:
  packages/app:
    specifiers:
      exact-workspace-range: workspace:1.0.0
      registry-alias: npm:@acme/secret@1.0.0
      workspace-alias: workspace:@acme/domain@*
    dependencies:
      empty-path: /
      exact-workspace-range: link:../domain
      registry-alias: /@acme/secret/1.0.0
      version-path-alias: /@acme/version-secret/2.0.0
      workspace-alias: link:../domain
