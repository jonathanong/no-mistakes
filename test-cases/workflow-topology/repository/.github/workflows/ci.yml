name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: dist

  consume:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-*

  reusable:
    needs: consume
    uses: ./.github/workflows/reusable.yml
    with:
      message: ready

  remote:
    uses: example/example/.github/workflows/check.yml@v1
