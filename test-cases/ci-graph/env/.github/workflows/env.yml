name: Env
on:
  push:
    paths:
      - "src/**"
env:
  CIGRAPH_WORKFLOW_VAR: hello
  CIGRAPH_NUMERIC: 42
  CIGRAPH_LIST:
    - one
    - two
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CIGRAPH_JOB_VAR: job-value
    if: ${{ env.CIGRAPH_WORKFLOW_VAR == 'hello' }}
    steps:
      - name: use vars
        env:
          CIGRAPH_STEP_VAR: step-value
        run: echo "${{ env.CIGRAPH_JOB_VAR }} ${{ env.CIGRAPH_STEP_VAR }}"
      - name: with reference
        uses: actions/github-script@v7
        with:
          script: console.log("${{ env.CIGRAPH_STEP_VAR }}")
      - name: reference numeric
        run: echo "${{ env.CIGRAPH_NUMERIC }}"
  # Null job body exercises the non-mapping skip path.
  placeholder:
