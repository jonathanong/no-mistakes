rules:
- rule: testing-dependencies
  scope: repository
  options:
    testingDependencyPatterns:
    - vitest
    - jsdom
    - supertest
    - "@vitest/"
    - "@testing-library/"
    webAllowedDeps:
    - "@testing-library/react"
    - "@testing-library/jest-dom"
    - vitest
    webSpecificDeps:
    - "@testing-library/react"
    - "@testing-library/jest-dom"
