tests:
  vitest:
    configs: vitest.config.mts
  jest:
    configs: jest.config.mjs
rules:
  - rule: test-no-unmocked-dynamic-imports
    scope: repository
    message: Dynamic imports in tests must be mocked
  # Keep both graph-backed rules enabled so aggregate-check tests protect canonical graph reuse.
  - rule: forbidden-dependencies
    scope: repository
    options:
      roots:
        - does-not-exist.mts
      forbiddenModules:
        - never-matches
