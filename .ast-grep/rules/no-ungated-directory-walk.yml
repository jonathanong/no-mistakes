# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/rule.json
#
# Flags a raw `read_dir(...)`/`WalkDir::new(...)` call in production
# discovery code. Neither has `.gitignore` awareness beyond whatever directory
# names get hardcoded into a denylist, so an unguarded walk can descend into
# huge generated/vendored directories (`node_modules`, `.next`, build output)
# that `git ls-files` would never surface. See crates/CLAUDE.md's
# "Never walk the tree without `.gitignore` awareness" section for the full
# explanation, the preferred fix order (derive from the git-visible file list;
# fall back to the `ignore` crate's `WalkBuilder` only outside a git repo), and
# a worked example.
#
# The sole exemption is a test-only helper that lists one small checked-in
# parser fixture directory. Production discovery has no file-level exemptions:
# even bounded or non-git paths must derive from shared git-visible candidates
# or use the `ignore` crate so a later edit cannot silently introduce a raw
# recursive walk in an allowlisted file.
id: no-ungated-directory-walk
language: rust
severity: error
message: >-
  Raw std::fs::read_dir/WalkDir::new walk with no .gitignore awareness. Prefer
  deriving matches from the canonical visible-path snapshot (see
  no_mistakes::codebase::ts_source::discover_visible_paths), falling back to
  ignore::WalkBuilder only outside a git repo. See crates/CLAUDE.md, "Never
  walk the tree without `.gitignore` awareness".
rule:
  any:
    - pattern: std::fs::read_dir($$$)
    - pattern: fs::read_dir($$$)
    - pattern: read_dir($$$)
    - pattern: WalkDir::new($$$)
    - pattern: walkdir::WalkDir::new($$$)
files:
  - "crates/no-mistakes/src/**"
ignores:
  - "crates/no-mistakes/src/integration_tests/tests/parser_coverage.rs"
