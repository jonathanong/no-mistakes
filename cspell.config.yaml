version: "0.2"
language: en
useGitignore: true
ignorePaths:
  - "Cargo.lock"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "target/**"
  - "coverage/**"
  - "node_modules/**"
  - "packages/*/vendor/**"
  - "test-cases/**"
  - "crates/**/target/**"
words:
  - arm64
  - Basenames
  - codebase
  - codecov
  - emnapi
  - glibc
  - guardrailsrc
  - jsonc
  - linecount
  - markdown
  - nextjs
  - Ong
  - oxlint
  - PCRE
  - pnpm
  - rustfmt
  - shellcheck
  - shasum
  - subdirs
  - subpaths
  - tokei
  - tsconfig
  - vitest
  - worktree
