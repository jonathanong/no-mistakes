# Empty Playwright policies and integration suites do not reserve Vitest paths.
projects:
  database-resources:
    root: .
  union-resources:
    root: .
tests:
  vitest:
    configs: vitest.config.mts
  playwright:
    configs: playwright.config.mts
    projects:
      browser:
        integration_suites:
          smoke: [e2e/home.spec.ts]
testPlan:
  vitest:
    fullSuiteTriggers:
      projects:
        database-resources:
          paths: [migrations/**/*.sql, "!migrations/ignored/**", migrations/ignored/reinclude.sql]
          targets: [database]
        union-resources:
          paths: [migrations/union.sql]
          targets: [web]
    environments:
      pre-push:
        globalConfigFallback: true
        exclude: [src/shared.test.ts]
      shared:
        globalConfigFallback: true
      limited:
        globalConfigFallback: true
        limit: { files: 1 }
  playwright:
    environments:
      pre-push:
        globalConfigFallback: true
