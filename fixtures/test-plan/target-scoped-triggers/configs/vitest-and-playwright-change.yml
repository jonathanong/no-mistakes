# Retains the committed Playwright exclusion and adds a working-tree Vitest
# limit change so mixed --base/--head plus --diff inputs have two provenances.
projects:
  database-resources: { root: . }
  union-resources: { root: . }
tests:
  vitest: { configs: vitest.config.mts }
  playwright:
    configs: playwright.config.mts
    testExclude: [e2e/ignored/**]
testPlan:
  vitest:
    fullSuiteTriggers:
      projects:
        database-resources:
          paths: [migrations/**/*.sql, "!migrations/ignored/**", migrations/ignored/reinclude.sql]
          targets: [database]
        union-resources: { paths: [migrations/union.sql], targets: [web] }
    environments:
      pre-push: { globalConfigFallback: true, exclude: [src/shared.test.ts] }
      shared: { globalConfigFallback: true }
      limited: { globalConfigFallback: true, limit: { files: 2 } }
  playwright:
    environments:
      pre-push: { globalConfigFallback: true }
