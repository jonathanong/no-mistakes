# This named Vitest policy is read by TestFileFilter for the dynamic-import rule.
projects:
  database-resources: { root: . }
  union-resources: { root: . }
rules:
  - rule: test-no-unmocked-dynamic-imports
    tests: { vitest: [database] }
tests:
  vitest:
    configs: vitest.database-a.mts
    projects:
      database:
        include: [src/shared.test.ts]
        exclude: [src/db/db.test.ts]
  playwright: { configs: playwright.config.mts }
testPlan:
  vitest:
    environments: { pre-push: { globalConfigFallback: true } }
  playwright:
    environments: { pre-push: { globalConfigFallback: true } }
