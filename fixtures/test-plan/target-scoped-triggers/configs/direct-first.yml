projects:
  database-resources:
    root: .
  union-resources:
    root: .
tests:
  vitest:
    configs: vitest.config.mts
  playwright:
    configs: playwright.config.mts
testPlan:
  vitest:
    fullSuiteTriggers:
      projects:
        database-resources:
          paths:
            - migrations/**/*.sql
            - "!migrations/ignored/**"
            - migrations/ignored/reinclude.sql
          targets:
            - database
        union-resources:
          paths:
            - migrations/union.sql
          targets:
            - web
    environments:
      direct-first:
        globalConfigFallback: true
        include:
          - src/shared.test.ts
        limit:
          files: 1
        groups:
          - type: direct
          - type: dependencies
  playwright:
    environments:
      pre-push:
        globalConfigFallback: true
