# Playwright remains unreferenced by the dynamic-import rule and stays scoped.
projects:
  database-resources: { root: . }
  union-resources: { root: . }
rules:
  - rule: test-no-unmocked-dynamic-imports
    tests: { vitest: [database] }
tests:
  vitest:
    configs: vitest.config.mts
    projects:
      database: { include: [src/db/db.test.ts] }
  playwright:
    configs: playwright.config.mts
    testExclude: [e2e/ignored/**]
testPlan:
  vitest:
    environments: { pre-push: { globalConfigFallback: true } }
  playwright:
    environments: { pre-push: { globalConfigFallback: true } }
