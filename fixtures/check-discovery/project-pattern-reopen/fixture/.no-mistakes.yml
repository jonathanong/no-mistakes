projects:
  typed:
    type: nextjs
  explicit:
    root: fixtures/build

rules:
  - rule: test-email-domain-policy
    projects:
      - typed
    include:
      - fixtures/**
      - src/node_modules/foo/**
    options:
      bannedDomains:
        - example.com
  - rule: test-email-domain-policy
    projects:
      - explicit
    include:
      - "**/components/**"
    options:
      bannedDomains:
        - example.com
